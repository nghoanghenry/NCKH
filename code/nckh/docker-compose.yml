services:
  db:
    image: postgres:15-alpine
    container_name: nckh-db
    environment:
      POSTGRES_DB: nckh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: nckh-backend
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/nckh
      JWT_SECRET: change_me
      BCRYPT_SALT_ROUNDS: 10
      CORS_ORIGIN: http://localhost,http://localhost:5173,http://localhost:4173,http://localhost:80
      UPLOAD_ROOT: /app/uploads
    depends_on:
      - db
    ports:
      - "4000:4000"
    volumes:
      - ./frontend/public:/data/geojson:ro
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: nckh-frontend
    depends_on:
      - backend
    ports:
      - "4173:4173"

  nginx:
    image: nginx:1.27-alpine
    container_name: nckh-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
