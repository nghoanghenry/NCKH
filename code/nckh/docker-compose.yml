services:
  db:
    image: postgres:15-alpine
    container_name: nckh-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nckh}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nckh}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - internal

  backend:
    build:
      context: ./backend
    container_name: nckh-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/${DB_NAME:-nckh}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      UPLOAD_ROOT: /app/uploads
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@nckh.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Default Admin}
      ADMIN_RESET_PASSWORD: ${ADMIN_RESET_PASSWORD:-false}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "4000"
    volumes:
      - ./frontend/public:/data/geojson:ro
      - ./backend/uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
    container_name: nckh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "4173"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: nckh-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
    driver: bridge
